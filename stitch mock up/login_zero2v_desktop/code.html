<body class="flex flex-col min-h-screen font-body-md text-on-surface antialiased">
<div class="flex-grow flex items-center justify-center p-gutter">
<main class="w-full max-w-[440px]">
<div class="bg-surface-container-lowest rounded-xl p-xl tonal-elevation relative overflow-hidden">
<!-- Nigerian Flag Watermark -->
<div class="flag-watermark">
<svg viewbox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
<rect fill="currentColor" height="60" width="33.3"></rect>
<rect fill="transparent" height="60" width="33.4" x="33.3"></rect>
<rect fill="currentColor" height="60" width="33.3" x="66.7"></rect>
</svg>
</div>
<!-- Brand Anchor -->
<header class="text-center mb-xl">
<div class="flex flex-col items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">zero2v</h1>
<p class="text-on-surface-variant font-body-sm">Instant NIN & BVN Verification</p>
</div>
</header>
<!-- Login Form -->
<form class="space-y-lg" onsubmit="event.preventDefault();">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs" for="email">Email Address</label>
<input class="w-full h-12 px-md bg-surface-bright border border-outline-variant rounded-lg text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="email" placeholder="admin@institution.gov.ng" type="email"/>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="text-primary font-label-caps text-label-caps hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-md bg-surface-bright border border-outline-variant rounded-lg text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-sm px-xs">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-on-surface-variant" for="remember">Remember this device</label>
</div>
<button class="w-full h-12 bg-primary text-on-primary font-label-caps text-label-caps rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all duration-200 shadow-md">
                        LOG IN
                    </button>
</form>
<!-- Ghost Button Action -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 text-center">
<p class="font-body-sm text-on-surface-variant mb-sm">New to the platform?</p>
<button class="w-full h-12 border border-primary text-primary font-label-caps text-label-caps rounded-lg hover:bg-primary/5 transition-all duration-200">
                        CREATE ACCOUNT
                    </button>
</div>
</div>
<!-- Footer Trust Signals -->
<footer class="mt-xl text-center space-y-md">
<div class="flex justify-center items-center gap-lg opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
<img alt="NIMC" class="h-8" data-alt="A clean, professional logo of the National Identity Management Commission (NIMC) of Nigeria, featuring a sophisticated governmental seal style. The image is rendered in a minimalist forest green and white palette, fitting perfectly into a modern GovTech interface. The lighting is soft and corporate, emphasizing institutional trust and authority." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSB0hY6jBuWr1wPeRAgsGpwWSFFnQ8_8inPFZF6G8IC3SVCYeAkK90p6BgJyU56Gu_iLUzpkF9qHVA7-E4p09TBGbU87paIddN7Fb_4eZpIocuYihJybvnRYraBfJcN0D-SIcRd4w9J4Cidr5IEuybpSVHxW0Il8xVU1rp0EGWTCH9LfjPlgpt6Z3rq_kRVtTLek-mnY8IpnQLnX8vshRQ1_K_I6SHNY6A2ggie8wRtuegZVJ9BnlSUrdXP4Ewgvy_bu3qDBmV2Q"/>

</div>
<p class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest leading-relaxed">
                    NIMC & CBN APPROVED PARTNER • SECURED BY 256-BIT ENCRYPTION<br/>
                    © 2024 zero2v. ALL RIGHTS RESERVED.
                </p>

</div>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30vw] h-[30vw] bg-secondary/5 rounded-full blur-[100px]"></div>

<script>
        // Micro-interaction for the "visibility" toggle
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Simple button active state effect
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
