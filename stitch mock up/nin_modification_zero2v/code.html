<script>
        // Simple radio selection visual toggle
        const radioInputs = document.querySelectorAll('input[name="service_type"]');
        radioInputs.forEach(input => {
            input.addEventListener('change', (e) => {
                // Reset all cards
                document.querySelectorAll('label[class*="border-primary"]').forEach(label => {
                    label.classList.remove('border-2', 'border-primary', 'shadow-sm', 'service-card-active');
                    label.classList.add('border', 'border-outline-variant');
                    const check = label.querySelector('span[style*="FILL: 1"]');
                    if (check) check.remove();
                    const icon = label.querySelector('.material-symbols-outlined');
                    if(icon) icon.classList.replace('text-primary', 'text-on-surface-variant');
                });

                // Apply style to selected
                const label = e.target.closest('label');
                label.classList.remove('border', 'border-outline-variant');
                label.classList.add('border-2', 'border-primary', 'shadow-sm', 'service-card-active');
                
                const icon = label.querySelector('.material-symbols-outlined');
                if(icon) icon.classList.replace('text-on-surface-variant', 'text-primary');

                // Add checkmark if not exists
                const flexHeader = label.querySelector('div');
                if(!flexHeader.querySelector('span[style*="FILL: 1"]')) {
                    const check = document.createElement('span');
                    check.className = 'material-symbols-outlined text-primary text-sm';
                    check.style.fontVariationSettings = "'FILL' 1";
                    check.innerText = 'check_circle';
                    flexHeader.appendChild(check);
                }
            });
        });

        // Numeric NIN Input formatting
        const ninInput = document.querySelector('input[placeholder="0000 0000 000"]');
        ninInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 11) val = val.substring(0, 11);
            e.target.value = val;
        });
    </script>
